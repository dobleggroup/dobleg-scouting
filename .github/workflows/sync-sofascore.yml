name: Sync Sofascore

on:
  workflow_dispatch:
    inputs:
      pages:
        description: 'Pages to discover (default 3, backfill up to 30)'
        default: '3'
      batch:
        description: 'Fixtures to process per run (default 5, backfill up to 30)'
        default: '5'

# NOTE: Sofascore blocks cloud provider IPs (GitHub Actions, Cloudflare Workers, etc.)
# This workflow is for manual triggers only when running from a self-hosted runner
# with residential IP. For automated sync, use Windows Task Scheduler with sync.py

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install curl_cffi

      - name: Run sync
        working-directory: scripts/sync-sofascore
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DISCOVER_PAGES: ${{ github.event.inputs.pages || '3' }}
          STATS_BATCH: ${{ github.event.inputs.batch || '5' }}
        run: python3 sync.py
