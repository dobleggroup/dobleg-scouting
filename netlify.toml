[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# API redirects
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Informes compartibles: proxy a Supabase Storage con la marca propia.
# status=200 = proxy real (la URL de dobleg-scouting.netlify.app queda en la barra).
# Debe ir ANTES del catch-all de la SPA, si no lo pisa.
[[redirects]]
  from = "/i/*"
  to = "https://qgwmxjjumauortbwvivu.supabase.co/storage/v1/object/public/informes-compartidos/:splat"
  status = 200
  force = true

# SPA routing - redirect all routes to index.html (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
