[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# API redirects
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Informes compartibles: se sirven vía una función que baja el HTML de Supabase
# Storage y lo re-emite como text/html (Storage lo sirve como text/plain + un CSP
# sandbox que deja la página en blanco). La URL branded /i/<slug> no cambia.
# Debe ir ANTES del catch-all de la SPA, si no lo pisa.
[[redirects]]
  from = "/i/*"
  to = "/.netlify/functions/informe/:splat"
  status = 200
  force = true

# SPA routing - redirect all routes to index.html (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
